name: Update Bolao Dashboard

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes, offset from the top of the hour to reduce queue delays.
    - cron: "17,47 * * * *"

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dplyr
            any::readr
            any::purrr
            any::stringr
            any::tidyr
            any::jsonlite
            any::httr2
            any::lubridate
            any::stringi

      - name: Update dashboard
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: Rscript R/update_bolao_dashboard.R

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results data/scored_outputs docs/index.html
          git commit -m "Update bolao dashboard" || echo "No changes to commit"
          git push
