name: Update Bolao Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.2"

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dplyr
            any::readr
            any::purrr
            any::stringr
            any::tidyr
            any::jsonlite
            any::httr2
            any::lubridate
            any::stringi

      - name: Update dashboard
        run: Rscript R/update_bolao_dashboard.R

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/index.html data/results/actual_results.csv data/scored_outputs || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update bolao dashboard"
            git push
          fi
